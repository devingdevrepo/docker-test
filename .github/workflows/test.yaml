name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Debug secrets
        run: |
          echo "Checking EC2 variables..."

          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "EC2_HOST is missing"
            exit 1
          else
            echo "EC2_HOST exists"
          fi

          if [ -z "${{ secrets.EC2_USER }}" ]; then
            echo "EC2_USER is missing"
            exit 1
          else
            echo "EC2_USER exists"
          fi

          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "EC2_SSH_KEY is missing"
            exit 1
          else
            echo "EC2_SSH_KEY exists"
          fi

      - name: Add EC2 host key
        run: |
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/id_rsa \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
          "echo SSH connection successful && hostname"
    #data 